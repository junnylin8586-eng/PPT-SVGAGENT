<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, Noto Sans SC, sans-serif">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F7FA"/>
      <stop offset="100%" style="stop-color:#E8ECF1"/>
    </linearGradient>
    
    <!-- 卡片渐变 -->
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003371"/>
      <stop offset="100%" style="stop-color:#004D8F"/>
    </linearGradient>
    
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00875A"/>
      <stop offset="100%" style="stop-color:#00A878"/>
    </linearGradient>
    
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005691"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E5F8A"/>
      <stop offset="100%" style="stop-color:#2A7BB0"/>
    </linearGradient>
    
    <!-- 装饰圆形 -->
    <circle id="decorCircle" cx="0" cy="0" r="100" fill="none" stroke="#003371" stroke-width="2" opacity="0.1"/>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1280" height="6" fill="#003371"/>
  
  <!-- 左侧装饰区域 -->
  <rect x="0" y="0" width="8" height="720" fill="#003371"/>
  
  <!-- 装饰圆形 -->
  <use href="#decorCircle" x="1100" y="100"/>
  <use href="#decorCircle" x="1200" y="600"/>
  
  <!-- 页面标题区域 -->
  <g transform="translate(60, 50)">
    <!-- 页面编号 -->
    <rect x="0" y="0" width="50" height="28" rx="4" fill="#003371"/>
    <text x="25" y="19" text-anchor="middle" fill="white" font-size="14" font-weight="600">05</text>
    
    <!-- 主标题 -->
    <text x="70" y="22" fill="#003371" font-size="32" font-weight="700">智慧城市建设预期成果</text>
    
    <!-- 标题下划线 -->
    <rect x="70" y="38" width="400" height="4" rx="2" fill="#00875A"/>
  </g>
  
  <!-- 内容区域 - 四个卡片 -->
  <g transform="translate(60, 130)">
    
    <!-- 卡片1: 政务服务 -->
    <g transform="translate(0, 0)">
      <!-- 卡片背景 -->
      <rect x="0" y="0" width="560" height="230" rx="12" fill="white" filter="drop-shadow(0 4px 12px rgba(0,51,113,0.1))"/>
      <!-- 左侧色块 -->
      <rect x="0" y="0" width="8" height="230" rx="4" fill="url(#cardGradient1)"/>
      
      <!-- 图标区域 -->
      <circle cx="80" cy="80" r="45" fill="#003371" opacity="0.1"/>
      <g transform="translate(80, 80)">
        <!-- 政务图标 - 印章/文件 -->
        <rect x="-20" y="-25" width="40" height="50" rx="4" fill="none" stroke="#003371" stroke-width="3"/>
        <line x1="-12" y1="-10" x2="12" y2="-10" stroke="#003371" stroke-width="2"/>
        <line x1="-12" y1="0" x2="12" y2="0" stroke="#003371" stroke-width="2"/>
        <line x1="-12" y1="10" x2="5" y2="10" stroke="#003371" stroke-width="2"/>
        <circle cx="0" cy="-30" r="10" fill="none" stroke="#003371" stroke-width="2"/>
      </g>
      
      <!-- 标签 -->
      <rect x="60" y="145" width="70" height="26" rx="13" fill="#003371" opacity="0.1"/>
      <text x="95" y="163" text-anchor="middle" fill="#003371" font-size="13" font-weight="600">政务服务</text>
      
      <!-- 核心数据 -->
      <text x="160" y="80" fill="#003371" font-size="52" font-weight="800">70%</text>
      <text x="160" y="105" fill="#666" font-size="16">效率提升</text>
      
      <!-- 描述 -->
      <text x="60" y="195" fill="#333" font-size="15">一网通办全覆盖</text>
      <text x="60" y="215" fill="#888" font-size="13">打造指尖上的政务服务</text>
    </g>
    
    <!-- 卡片2: 城市治理 -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="560" height="230" rx="12" fill="white" filter="drop-shadow(0 4px 12px rgba(0,135,90,0.1))"/>
      <rect x="0" y="0" width="8" height="230" rx="4" fill="url(#cardGradient2)"/>
      
      <!-- 图标区域 -->
      <circle cx="80" cy="80" r="45" fill="#00875A" opacity="0.1"/>
      <g transform="translate(80, 80)">
        <!-- 城市治理图标 - 盾牌/安全 -->
        <path d="M0,-30 L25,-15 L25,10 Q25,30 0,40 Q-25,30 -25,10 L-25,-15 Z" fill="none" stroke="#00875A" stroke-width="3"/>
        <path d="M-8,5 L-2,12 L12,-5" fill="none" stroke="#00875A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      
      <!-- 标签 -->
      <rect x="60" y="145" width="70" height="26" rx="13" fill="#00875A" opacity="0.1"/>
      <text x="95" y="163" text-anchor="middle" fill="#00875A" font-size="13" font-weight="600">城市治理</text>
      
      <!-- 核心数据 -->
      <text x="160" y="80" fill="#00875A" font-size="52" font-weight="800">50%</text>
      <text x="160" y="105" fill="#666" font-size="16">响应提速</text>
      
      <!-- 描述 -->
      <text x="60" y="195" fill="#333" font-size="15">应急响应时间大幅缩短</text>
      <text x="60" y="215" fill="#888" font-size="13">城市安全韧性显著增强</text>
    </g>
    
    <!-- 卡片3: 民生福祉 -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="560" height="230" rx="12" fill="white" filter="drop-shadow(0 4px 12px rgba(0,86,145,0.1))"/>
      <rect x="0" y="0" width="8" height="230" rx="4" fill="url(#cardGradient3)"/>
      
      <!-- 图标区域 -->
      <circle cx="80" cy="80" r="45" fill="#005691" opacity="0.1"/>
      <g transform="translate(80, 80)">
        <!-- 医疗图标 - 心跳/健康 -->
        <path d="M-25,5 Q-25,-15 -10,-15 Q5,-15 10,5 Q15,-15 25,-15 Q35,-15 35,5 L35,15 Q35,25 25,30 L-15,30 Q-25,30 -25,20 Z" fill="none" stroke="#005691" stroke-width="3" stroke-linejoin="round"/>
        <line x1="-25" y1="30" x2="-25" y2="10" stroke="#005691" stroke-width="3"/>
        <line x1="35" y1="30" x2="35" y2="15" stroke="#005691" stroke-width="3"/>
      </g>
      
      <!-- 标签 -->
      <rect x="60" y="145" width="70" height="26" rx="13" fill="#005691" opacity="0.1"/>
      <text x="95" y="163" text-anchor="middle" fill="#005691" font-size="13" font-weight="600">民生福祉</text>
      
      <!-- 核心数据 -->
      <text x="160" y="80" fill="#005691" font-size="52" font-weight="800">秒级</text>
      <text x="160" y="105" fill="#666" font-size="16">跨院转诊</text>
      
      <!-- 描述 -->
      <text x="60" y="195" fill="#333" font-size="15">医疗资源共享，跨院转诊秒级完成</text>
      <text x="60" y="215" fill="#888" font-size="13">优质医疗资源普惠民生</text>
    </g>
    
    <!-- 卡片4: 经济效益 -->
    <g transform="translate(600, 260)">
      <rect x="0" y="0" width="560" height="230" rx="12" fill="white" filter="drop-shadow(0 4px 12px rgba(30,95,138,0.1))"/>
      <rect x="0" y="0" width="8" height="230" rx="4" fill="url(#cardGradient4)"/>
      
      <!-- 图标区域 -->
      <circle cx="80" cy="80" r="45" fill="#1E5F8A" opacity="0.1"/>
      <g transform="translate(80, 80)">
        <!-- 经济图标 - 上升趋势 -->
        <rect x="-25" y="-25" width="50" height="50" rx="6" fill="none" stroke="#1E5F8A" stroke-width="3"/>
        <path d="M-18,20 L-5,8 L8,15 L22,-8" fill="none" stroke="#1E5F8A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="22,-8 22,5 15,-8" fill="#1E5F8A"/>
      </g>
      
      <!-- 标签 -->
      <rect x="60" y="145" width="70" height="26" rx="13" fill="#1E5F8A" opacity="0.1"/>
      <text x="95" y="163" text-anchor="middle" fill="#1E5F8A" font-size="13" font-weight="600">经济效益</text>
      
      <!-- 核心数据 -->
      <text x="160" y="80" fill="#1E5F8A" font-size="44" font-weight="800">3000万<tspan font-size="28">元/年</tspan></text>
      <text x="160" y="105" fill="#666" font-size="16">运营成本节约</text>
      
      <!-- 描述 -->
      <text x="60" y="195" fill="#333" font-size="15">年节约运营成本 3000 万元</text>
      <text x="60" y="215" fill="#888" font-size="13">数字化转型带来显著投资回报</text>
    </g>
    
  </g>
  
  <!-- 底部装饰线 -->
  <rect x="60" y="680" width="1160" height="2" fill="#003371" opacity="0.2"/>
  
  <!-- 底部信息 -->
  <g transform="translate(60, 695)">
    <circle cx="6" cy="6" r="4" fill="#00875A"/>
    <text x="16" y="10" fill="#666" font-size="12">数据来源：智慧城市建设规划方案 | 统计周期：2024-2025</text>
  </g>
  
  <!-- 右侧装饰 -->
  <g transform="translate(1220, 600)">
    <rect x="0" y="0" width="30" height="4" rx="2" fill="#00875A"/>
    <rect x="0" y="10" width="20" height="4" rx="2" fill="#003371" opacity="0.3"/>
    <rect x="0" y="20" width="40" height="4" rx="2" fill="#003371" opacity="0.2"/>
  </g>
  
</svg>
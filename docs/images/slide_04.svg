<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, Noto Sans SC, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003371"/>
      <stop offset="100%" style="stop-color:#005691"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003371"/>
      <stop offset="50%" style="stop-color:#005691"/>
      <stop offset="100%" style="stop-color:#00875A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#003371" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F5F7FA"/>
  
  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#headerGrad)"/>
  
  <!-- 页面标题区域 -->
  <rect x="0" y="8" width="1280" height="100" fill="url(#headerGrad)"/>
  <text x="80" y="72" font-size="36" font-weight="600" fill="#FFFFFF">分阶段推进实施路径</text>
  <text x="80" y="95" font-size="16" fill="#FFFFFF" opacity="0.8">IMPLEMENTATION ROADMAP</text>
  
  <!-- 右侧装饰圆 -->
  <circle cx="1200" cy="58" r="35" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="1150" cy="58" r="25" fill="#FFFFFF" opacity="0.1"/>
  
  <!-- 时间轴连接线 -->
  <line x1="200" y1="380" x2="1080" y2="380" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 第一阶段卡片 -->
  <g filter="url(#shadow)">
    <rect x="80" y="200" width="340" height="340" rx="12" fill="#FFFFFF"/>
    <rect x="80" y="200" width="340" height="8" rx="4" fill="#003371"/>
    <!-- 时间节点 -->
    <circle cx="250" cy="380" r="20" fill="#003371" stroke="#FFFFFF" stroke-width="4"/>
    <text x="250" y="387" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">1</text>
  </g>
  <text x="250" y="250" font-size="24" font-weight="600" fill="#003371" text-anchor="middle">第一阶段</text>
  <text x="250" y="280" font-size="16" fill="#00875A" text-anchor="middle">0-6 个月</text>
  <line x1="140" y1="305" x2="360" y2="305" stroke="#E8E8E8" stroke-width="1"/>
  <!-- 图标区域 -->
  <rect x="130" y="330" width="240" height="80" rx="8" fill="#F5F7FA"/>
  <g transform="translate(170, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#003371" opacity="0.1"/>
    <path d="M12 20 L20 12 L28 20 M20 12 L20 32" stroke="#003371" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="8" y="26" width="24" height="6" rx="2" fill="#003371" opacity="0.3"/>
  </g>
  <g transform="translate(220, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#003371" opacity="0.1"/>
    <circle cx="20" cy="18" r="8" stroke="#003371" stroke-width="2" fill="none"/>
    <path d="M20 26 L20 32 M16 32 L24 32" stroke="#003371" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(270, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#003371" opacity="0.1"/>
    <rect x="10" y="12" width="20" height="16" rx="2" stroke="#003371" stroke-width="2" fill="none"/>
    <path d="M10 22 L20 22 L30 22" stroke="#003371" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="250" y="460" font-size="18" font-weight="500" fill="#333333" text-anchor="middle">基础设施建设</text>
  <text x="250" y="490" font-size="14" fill="#666666" text-anchor="middle">与数据治理</text>
  
  <!-- 第二阶段卡片 -->
  <g filter="url(#shadow)">
    <rect x="470" y="200" width="340" height="340" rx="12" fill="#FFFFFF"/>
    <rect x="470" y="200" width="340" height="8" rx="4" fill="#005691"/>
    <!-- 时间节点 -->
    <circle cx="640" cy="380" r="20" fill="#005691" stroke="#FFFFFF" stroke-width="4"/>
    <text x="640" y="387" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">2</text>
  </g>
  <text x="640" y="250" font-size="24" font-weight="600" fill="#005691" text-anchor="middle">第二阶段</text>
  <text x="640" y="280" font-size="16" fill="#00875A" text-anchor="middle">6-12 个月</text>
  <line x1="530" y1="305" x2="750" y2="305" stroke="#E8E8E8" stroke-width="1"/>
  <!-- 图标区域 -->
  <rect x="520" y="330" width="240" height="80" rx="8" fill="#F5F7FA"/>
  <g transform="translate(560, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#005691" opacity="0.1"/>
    <circle cx="20" cy="16" r="6" stroke="#005691" stroke-width="2" fill="none"/>
    <path d="M10 30 Q20 22 30 30" stroke="#005691" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(610, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#005691" opacity="0.1"/>
    <rect x="8" y="10" width="24" height="18" rx="2" stroke="#005691" stroke-width="2" fill="none"/>
    <circle cx="20" cy="32" r="4" fill="#005691"/>
  </g>
  <g transform="translate(660, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#005691" opacity="0.1"/>
    <path d="M12 28 L20 12 L28 28 Z" stroke="#005691" stroke-width="2" fill="none"/>
    <circle cx="20" cy="22" r="3" fill="#005691"/>
  </g>
  <text x="640" y="460" font-size="18" font-weight="500" fill="#333333" text-anchor="middle">核心场景试点</text>
  <text x="640" y="490" font-size="14" fill="#666666" text-anchor="middle">与 AI 能力建设</text>
  
  <!-- 第三阶段卡片 -->
  <g filter="url(#shadow)">
    <rect x="860" y="200" width="340" height="340" rx="12" fill="#FFFFFF"/>
    <rect x="860" y="200" width="340" height="8" rx="4" fill="#00875A"/>
    <!-- 时间节点 -->
    <circle cx="1030" cy="380" r="20" fill="#00875A" stroke="#FFFFFF" stroke-width="4"/>
    <text x="1030" y="387" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">3</text>
  </g>
  <text x="1030" y="250" font-size="24" font-weight="600" fill="#00875A" text-anchor="middle">第三阶段</text>
  <text x="1030" y="280" font-size="16" fill="#00875A" text-anchor="middle">12-18 个月</text>
  <line x1="920" y1="305" x2="1140" y2="305" stroke="#E8E8E8" stroke-width="1"/>
  <!-- 图标区域 -->
  <rect x="910" y="330" width="240" height="80" rx="8" fill="#F5F7FA"/>
  <g transform="translate(950, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#00875A" opacity="0.1"/>
    <circle cx="20" cy="14" r="8" stroke="#00875A" stroke-width="2" fill="none"/>
    <circle cx="20" cy="14" r="3" fill="#00875A"/>
    <path d="M8 28 L14 22 L20 26 L32 14" stroke="#00875A" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(1000, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#00875A" opacity="0.1"/>
    <path d="M10 10 L10 30 L20 20 L30 30 L30 10 Z" stroke="#00875A" stroke-width="2" fill="none"/>
    <circle cx="20" cy="20" r="3" fill="#00875A"/>
  </g>
  <g transform="translate(1050, 350)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#00875A" opacity="0.1"/>
    <circle cx="12" cy="20" r="6" stroke="#00875A" stroke-width="2" fill="none"/>
    <circle cx="28" cy="20" r="6" stroke="#00875A" stroke-width="2" fill="none"/>
    <path d="M18 20 L22 20" stroke="#00875A" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="1030" y="460" font-size="18" font-weight="500" fill="#333333" text-anchor="middle">全域推广</text>
  <text x="1030" y="490" font-size="14" fill="#666666" text-anchor="middle">与生态开放</text>
  
  <!-- 底部装饰 -->
  <rect x="0" y="700" width="1280" height="20" fill="#003371"/>
  <text x="80" y="718" font-size="12" fill="#FFFFFF" opacity="0.8">智慧城市数字化转型研究报告</text>
  <text x="1200" y="718" font-size="12" fill="#FFFFFF" text-anchor="end" opacity="0.8">第 4 页 / 共 5 页</text>
</svg>
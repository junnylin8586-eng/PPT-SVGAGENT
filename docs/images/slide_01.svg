<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F7FA"/>
      <stop offset="100%" style="stop-color:#E8EDF2"/>
    </linearGradient>
    
    <!-- 主色渐变 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003371"/>
      <stop offset="100%" style="stop-color:#005691"/>
    </linearGradient>
    
    <!-- 装饰圆形渐变 -->
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#003371;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#003371;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 光效渐变 -->
    <linearGradient id="lightEffect" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003371;stop-opacity:0.05"/>
      <stop offset="50%" style="stop-color:#003371;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#003371;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#primaryGradient)"/>
  
  <!-- 左侧装饰区域 -->
  <rect x="0" y="0" width="6" height="720" fill="url(#primaryGradient)"/>
  
  <!-- 装饰性圆形元素 - 左上 -->
  <circle cx="150" cy="120" r="180" fill="url(#circleGradient)"/>
  <circle cx="80" cy="200" r="120" fill="url(#circleGradient)"/>
  
  <!-- 装饰性圆形元素 - 右下 -->
  <circle cx="1150" cy="600" r="200" fill="url(#circleGradient)"/>
  <circle cx="1200" cy="550" r="150" fill="url(#circleGradient)"/>
  
  <!-- 几何装饰线条 -->
  <line x1="100" y1="300" x2="300" y2="300" stroke="#003371" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="100" y1="320" x2="250" y2="320" stroke="#003371" stroke-width="1" stroke-opacity="0.15"/>
  
  <line x1="980" y1="400" x2="1180" y2="400" stroke="#003371" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="1030" y1="420" x2="1180" y2="420" stroke="#003371" stroke-width="1" stroke-opacity="0.15"/>
  
  <!-- 科技感装饰点 -->
  <g fill="#003371" fill-opacity="0.1">
    <circle cx="120" cy="450" r="3"/>
    <circle cx="140" cy="450" r="2"/>
    <circle cx="155" cy="450" r="3"/>
    <circle cx="175" cy="450" r="2"/>
    <circle cx="190" cy="450" r="3"/>
  </g>
  
  <g fill="#003371" fill-opacity="0.1">
    <circle cx="1090" cy="280" r="3"/>
    <circle cx="1110" cy="280" r="2"/>
    <circle cx="1125" cy="280" r="3"/>
    <circle cx="1145" cy="280" r="2"/>
    <circle cx="1160" cy="280" r="3"/>
  </g>
  
  <!-- 主标题区域背景 -->
  <rect x="180" y="240" width="920" height="280" rx="8" fill="url(#lightEffect)"/>
  
  <!-- 主标题 -->
  <text x="640" y="330" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="52" font-weight="700" fill="#003371">智慧城市数字化转型研究报告</text>
  
  <!-- 分隔线 -->
  <rect x="440" y="365" width="400" height="4" rx="2" fill="#003371" fill-opacity="0.3"/>
  
  <!-- 副标题 -->
  <text x="640" y="420" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="24" font-weight="400" fill="#005691">基于新一代信息技术的城市治理创新实践</text>
  
  <!-- 底部装饰信息 -->
  <rect x="0" y="660" width="1280" height="60" fill="#003371" fill-opacity="0.05"/>
  
  <!-- 底部信息栏 -->
  <rect x="0" y="660" width="1280" height="60" fill="#003371" fill-opacity="0.03"/>
  
  <!-- 页码装饰 -->
  <rect x="580" y="680" width="120" height="4" rx="2" fill="#003371" fill-opacity="0.4"/>
  
  <!-- 装饰性六边形图案 -->
  <g fill="none" stroke="#003371" stroke-opacity="0.08" stroke-width="1">
    <polygon points="1250,100 1270,115 1270,145 1250,160 1230,145 1230,115" transform="translate(-50,0)"/>
    <polygon points="50,550 70,565 70,595 50,610 30,595 30,565"/>
    <polygon points="1250,550 1270,565 1270,595 1250,610 1230,595 1230,565" transform="translate(-100,0)"/>
  </g>
  
  <!-- 右上角装饰 -->
  <g fill="#003371" fill-opacity="0.06">
    <rect x="1150" y="50" width="80" height="80" rx="4"/>
    <rect x="1170" y="70" width="80" height="80" rx="4"/>
  </g>
  
  <!-- 底部标语 -->
  <text x="640" y="630" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="14" fill="#003371" fill-opacity="0.5">数字中国 · 智慧城市 · 创新发展</text>
  
  <!-- 左侧装饰图标区域 -->
  <g transform="translate(80, 520)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#003371" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="20" cy="20" r="8" fill="#003371" fill-opacity="0.2"/>
    <circle cx="55" cy="20" r="10" fill="none" stroke="#003371" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="55" cy="20" r="5" fill="#003371" fill-opacity="0.2"/>
    <line x1="35" y1="20" x2="45" y2="20" stroke="#003371" stroke-width="1.5" stroke-opacity="0.3"/>
  </g>
  
  <!-- 右下角装饰 -->
  <g transform="translate(1100, 520)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#003371" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="20" cy="20" r="8" fill="#003371" fill-opacity="0.2"/>
    <circle cx="55" cy="20" r="10" fill="none" stroke="#003371" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="55" cy="20" r="5" fill="#003371" fill-opacity="0.2"/>
    <line x1="35" y1="20" x2="45" y2="20" stroke="#003371" stroke-width="1.5" stroke-opacity="0.3"/>
  </g>
  
</svg>
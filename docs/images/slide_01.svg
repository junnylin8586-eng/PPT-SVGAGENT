<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- 芯片电路纹理渐变 -->
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003371" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#005691" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#003371" stop-opacity="0.08"/>
    </linearGradient>
    
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#E8ECF0"/>
    </linearGradient>
    
    <!-- 地球渐变 -->
    <radialGradient id="globeGradient" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="70%" stop-color="#003371"/>
      <stop offset="100%" stop-color="#001F4A"/>
    </radialGradient>
    
    <!-- 手机渐变 -->
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1A252F"/>
    </linearGradient>
    
    <!-- 光晕效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 芯片节点标记 -->
    <symbol id="circuitNode" viewBox="0 0 10 10">
      <circle cx="5" cy="5" r="3" fill="#003371" fill-opacity="0.15"/>
      <circle cx="5" cy="5" r="1.5" fill="#003371" fill-opacity="0.3"/>
    </symbol>
  </defs>
  
  <!-- 背景层 -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 芯片电路纹理背景 -->
  <g opacity="0.6">
    <!-- 水平线 -->
    <line x1="0" y1="80" x2="400" y2="80" stroke="#003371" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="880" y1="80" x2="1280" y2="80" stroke="#003371" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="0" y1="200" x2="200" y2="200" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="1080" y1="200" x2="1280" y2="200" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="0" y1="520" x2="300" y2="520" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="980" y1="520" x2="1280" y2="520" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="0" y1="640" x2="500" y2="640" stroke="#003371" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="780" y1="640" x2="1280" y2="640" stroke="#003371" stroke-width="0.5" stroke-opacity="0.15"/>
    
    <!-- 垂直线 -->
    <line x1="120" y1="0" x2="120" y2="150" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="1160" y1="0" x2="1160" y2="150" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="250" y1="570" x2="250" y2="720" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="1030" y1="570" x2="1030" y2="720" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    
    <!-- 斜线连接 -->
    <line x1="120" y1="80" x2="250" y2="150" stroke="#003371" stroke-width="0.5" stroke-opacity="0.1"/>
    <line x1="1160" y1="80" x2="1030" y2="150" stroke="#003371" stroke-width="0.5" stroke-opacity="0.1"/>
    <line x1="120" y1="640" x2="250" y2="570" stroke="#003371" stroke-width="0.5" stroke-opacity="0.1"/>
    <line x1="1160" y1="640" x2="1030" y2="570" stroke="#003371" stroke-width="0.5" stroke-opacity="0.1"/>
    
    <!-- 数据流点线 -->
    <line x1="320" y1="120" x2="420" y2="120" stroke="#003371" stroke-width="0.3" stroke-opacity="0.1" stroke-dasharray="4,4"/>
    <line x1="860" y1="120" x2="960" y2="120" stroke="#003371" stroke-width="0.3" stroke-opacity="0.1" stroke-dasharray="4,4"/>
    <line x1="320" y1="600" x2="420" y2="600" stroke="#003371" stroke-width="0.3" stroke-opacity="0.1" stroke-dasharray="4,4"/>
    <line x1="860" y1="600" x2="960" y2="600" stroke="#003371" stroke-width="0.3" stroke-opacity="0.1" stroke-dasharray="4,4"/>
    
    <!-- 电路节点 -->
    <use href="#circuitNode" x="115" y="75" width="10" height="10"/>
    <use href="#circuitNode" x="1155" y="75" width="10" height="10"/>
    <use href="#circuitNode" x="245" y="145" width="10" height="10"/>
    <use href="#circuitNode" x="1025" y="145" width="10" height="10"/>
    <use href="#circuitNode" x="315" y="115" width="10" height="10"/>
    <use href="#circuitNode" x="955" y="115" width="10" height="10"/>
    <use href="#circuitNode" x="245" y="515" width="10" height="10"/>
    <use href="#circuitNode" x="1025" y="515" width="10" height="10"/>
    <use href="#circuitNode" x="315" y="595" width="10" height="10"/>
    <use href="#circuitNode" x="955" y="595" width="10" height="10"/>
    
    <!-- 小芯片图案 -->
    <rect x="50" y="140" width="20" height="20" rx="2" fill="none" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <rect x="1210" y="140" width="20" height="20" rx="2" fill="none" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <rect x="50" y="560" width="20" height="20" rx="2" fill="none" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
    <rect x="1210" y="560" width="20" height="20" rx="2" fill="none" stroke="#003371" stroke-width="0.5" stroke-opacity="0.12"/>
  </g>
  
  <!-- 装饰性数据流动线条 -->
  <g opacity="0.4">
    <path d="M0 300 Q200 280 400 300 T800 300 T1280 300" fill="none" stroke="#003371" stroke-width="0.3" stroke-opacity="0.08"/>
    <path d="M0 350 Q200 370 400 350 T800 350 T1280 350" fill="none" stroke="#003371" stroke-width="0.3" stroke-opacity="0.08"/>
    <path d="M0 400 Q200 380 400 400 T800 400 T1280 400" fill="none" stroke="#003371" stroke-width="0.3" stroke-opacity="0.08"/>
  </g>
  
  <!-- 中央图标区域 - 地球与手机组合 -->
  <g transform="translate(640, 300)">
    <!-- 地球光晕 -->
    <circle cx="0" cy="0" r="130" fill="url(#globeGradient)" fill-opacity="0.08" filter="url(#glow)"/>
    
    <!-- 地球轮廓 -->
    <circle cx="-20" cy="-10" r="85" fill="url(#globeGradient)" stroke="#003371" stroke-width="2" stroke-opacity="0.3"/>
    
    <!-- 地球经纬线 -->
    <ellipse cx="-20" cy="-10" rx="85" ry="30" fill="none" stroke="#4A90D9" stroke-width="0.8" stroke-opacity="0.4"/>
    <ellipse cx="-20" cy="-10" rx="85" ry="60" fill="none" stroke="#4A90D9" stroke-width="0.8" stroke-opacity="0.3"/>
    <ellipse cx="-20" cy="-10" rx="50" ry="85" fill="none" stroke="#4A90D9" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="-105" y1="-10" x2="65" y2="-10" stroke="#4A90D9" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="-20" y1="-95" x2="-20" y2="75" stroke="#4A90D9" stroke-width="0.8" stroke-opacity="0.3"/>
    
    <!-- 地球大洲简化轮廓 -->
    <path d="M-70 -40 Q-50 -50 -30 -35 Q-10 -20 -25 0 Q-40 15 -60 5 Q-80 -10 -70 -40" fill="#005691" fill-opacity="0.2"/>
    <path d="M10 -50 Q30 -55 45 -40 Q50 -25 40 -10 Q30 5 15 -5 Q5 -20 10 -50" fill="#005691" fill-opacity="0.2"/>
    <path d="M-85 20 Q-70 15 -60 25 Q-55 40 -70 45 Q-85 40 -85 20" fill="#005691" fill-opacity="0.2"/>
    
    <!-- 手机图标 - 叠加在地球右侧 -->
    <g transform="translate(35, -35)">
      <!-- 手机边框 -->
      <rect x="0" y="0" width="55" height="100" rx="8" fill="url(#phoneGradient)" stroke="#00875A" stroke-width="1.5"/>
      <!-- 手机屏幕 -->
      <rect x="3" y="8" width="49" height="80" rx="3" fill="#003371" fill-opacity="0.9"/>
      <!-- 屏幕内容 - 信号波纹 -->
      <path d="M15 55 Q25 45 35 55" fill="none" stroke="#00875A" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M12 50 Q27.5 35 43 50" fill="none" stroke="#00875A" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
      <path d="M9 45 Q30 25 51 45" fill="none" stroke="#00875A" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
      <!-- 屏幕上移三角形 - 表示增长 -->
      <path d="M27.5 70 L22 60 L33 60 Z" fill="#00875A" fill-opacity="0.6"/>
      <!-- Home键 -->
      <circle cx="27.5" cy="94" r="4" fill="none" stroke="#4A5568" stroke-width="1"/>
      <!-- 前置摄像头 -->
      <circle cx="27.5" cy="4" r="2" fill="#1A202C"/>
    </g>
    
    <!-- 连接线 - 地球到手机 -->
    <line x1="55" y1="20" x2="35" y2="10" stroke="#00875A" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  </g>
  
  <!-- 主标题 -->
  <text x="640" y="480" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="42" font-weight="700" fill="#003371">
    2026年全球智能手机行业
  </text>
  <text x="640" y="530" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="42" font-weight="700" fill="#003371">
    销量排名分析
  </text>
  
  <!-- 副标题 -->
  <text x="640" y="570" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="20" font-weight="400" fill="#005691">
    市场格局重塑与品牌竞争态势洞察
  </text>
  
  <!-- 装饰线 -->
  <line x1="440" y1="590" x2="840" y2="590" stroke="#00875A" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
  
  <!-- 数据来源 -->
  <text x="640" y="680" text-anchor="middle" font-family="system-ui, Noto Sans SC, sans-serif" font-size="12" font-weight="400" fill="#6B7280">
    数据来源：IDC / Canalys / Counterpoint 2026Q1-Q4
  </text>
  
  <!-- 角落装饰 -->
  <g opacity="0.15">
    <path d="M0 30 L30 30 L30 0" fill="none" stroke="#003371" stroke-width="2"/>
    <path d="M1280 30 L1250 30 L1250 0" fill="none" stroke="#003371" stroke-width="2"/>
    <path d="M0 690 L30 690 L30 720" fill="none" stroke="#003371" stroke-width="2"/>
    <path d="M1280 690 L1250 690 L1250 720" fill="none" stroke="#003371" stroke-width="2"/>
  </g>
  
  <!-- 底部装饰条 -->
  <rect x="0" y="710" width="1280" height="10" fill="#003371" fill-opacity="0.1"/>
  <rect x="520" y="710" width="240" height="10" fill="#00875A" fill-opacity="0.6"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, Noto Sans SC, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003371"/>
      <stop offset="100%" stop-color="#005691"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003371"/>
      <stop offset="100%" stop-color="#004a8f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#003371" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#F5F7FA"/>
  
  <!-- Top header bar -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#headerGrad)"/>
  
  <!-- Left decorative bar -->
  <rect x="0" y="60" width="6" height="80" fill="#003371"/>
  
  <!-- Page number indicator -->
  <rect x="1150" y="40" width="100" height="40" rx="4" fill="#003371" opacity="0.1"/>
  <text x="1200" y="68" text-anchor="middle" fill="#003371" font-size="16" font-weight="600">02</text>
  
  <!-- Main Title -->
  <text x="60" y="110" fill="#003371" font-size="42" font-weight="700">数字中国战略下的城市转型需求</text>
  
  <!-- Subtitle line -->
  <rect x="60" y="125" width="80" height="4" rx="2" fill="#00875A"/>
  
  <!-- Three content cards -->
  <!-- Card 1: 政策驱动 -->
  <g filter="url(#shadow)">
    <rect x="60" y="180" width="360" height="420" rx="12" fill="#FFFFFF"/>
    <rect x="60" y="180" width="360" height="8" rx="4" fill="url(#cardGrad1)"/>
    
    <!-- Icon circle -->
    <circle cx="140" cy="260" r="50" fill="#003371" opacity="0.1"/>
    <circle cx="140" cy="260" r="40" fill="#003371"/>
    <text x="140" y="255" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">政策</text>
    <text x="140" y="275" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">驱动</text>
    
    <!-- Title -->
    <text x="200" y="250" fill="#003371" font-size="26" font-weight="700">政策驱动</text>
    <text x="200" y="280" fill="#005691" font-size="16">数字中国建设全面提速</text>
    
    <!-- Divider -->
    <rect x="80" y="320" width="320" height="2" rx="1" fill="#E8EEF4"/>
    
    <!-- Description -->
    <text x="80" y="365" fill="#4A5568" font-size="15" font-weight="500">核心要点</text>
    <text x="80" y="400" fill="#2D3748" font-size="15">
      <tspan x="80" dy="0">• 国家数字战略持续深化</tspan>
      <tspan x="80" dy="28">• 新型基础设施建设加码</tspan>
      <tspan x="80" dy="28">• 政务数字化转型加速</tspan>
      <tspan x="80" dy="28">• 数据要素市场化改革</tspan>
    </text>
    
    <!-- Bottom accent -->
    <rect x="80" y="540" width="300" height="4" rx="2" fill="#00875A" opacity="0.3"/>
  </g>
  
  <!-- Card 2: 技术成熟 -->
  <g filter="url(#shadow)">
    <rect x="460" y="180" width="360" height="420" rx="12" fill="#FFFFFF"/>
    <rect x="460" y="180" width="360" height="8" rx="4" fill="url(#cardGrad1)"/>
    
    <!-- Icon circle -->
    <circle cx="540" cy="260" r="50" fill="#003371" opacity="0.1"/>
    <circle cx="540" cy="260" r="40" fill="#00875A"/>
    <text x="540" y="255" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">技术</text>
    <text x="540" y="275" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">成熟</text>
    
    <!-- Title -->
    <text x="600" y="250" fill="#003371" font-size="26" font-weight="700">技术成熟</text>
    <text x="600" y="280" fill="#005691" font-size="16">大模型、物联网、5G 加速落地</text>
    
    <!-- Divider -->
    <rect x="480" y="320" width="320" height="2" rx="1" fill="#E8EEF4"/>
    
    <!-- Description -->
    <text x="480" y="365" fill="#4A5568" font-size="15" font-weight="500">核心要点</text>
    <text x="480" y="400" fill="#2D3748" font-size="15">
      <tspan x="480" dy="0">• AI大模型赋能城市治理</tspan>
      <tspan x="480" dy="28">• 物联网连接全域感知</tspan>
      <tspan x="480" dy="28">• 5G网络覆盖持续扩大</tspan>
      <tspan x="480" dy="28">• 云计算能力持续增强</tspan>
    </text>
    
    <!-- Bottom accent -->
    <rect x="480" y="540" width="300" height="4" rx="2" fill="#00875A" opacity="0.3"/>
  </g>
  
  <!-- Card 3: 民生需求 -->
  <g filter="url(#shadow)">
    <rect x="860" y="180" width="360" height="420" rx="12" fill="#FFFFFF"/>
    <rect x="860" y="180" width="360" height="8" rx="4" fill="url(#cardGrad1)"/>
    
    <!-- Icon circle -->
    <circle cx="940" cy="260" r="50" fill="#003371" opacity="0.1"/>
    <circle cx="940" cy="260" r="40" fill="#005691"/>
    <text x="940" y="255" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">民生</text>
    <text x="940" y="275" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">需求</text>
    
    <!-- Title -->
    <text x="1000" y="250" fill="#003371" font-size="26" font-weight="700">民生需求</text>
    <text x="1000" y="280" fill="#005691" font-size="16">城市治理效率和居民体验双重提升</text>
    
    <!-- Divider -->
    <rect x="880" y="320" width="320" height="2" rx="1" fill="#E8EEF4"/>
    
    <!-- Description -->
    <text x="880" y="365" fill="#4A5568" font-size="15" font-weight="500">核心要点</text>
    <text x="880" y="400" fill="#2D3748" font-size="15">
      <tspan x="880" dy="0">• 政务服务效率提升</tspan>
      <tspan x="880" dy="28">• 公共服务便捷化</tspan>
      <tspan x="880" dy="28">• 城市治理精细化</tspan>
      <tspan x="880" dy="28">• 居民获得感增强</tspan>
    </text>
    
    <!-- Bottom accent -->
    <rect x="880" y="540" width="300" height="4" rx="2" fill="#00875A" opacity="0.3"/>
  </g>
  
  <!-- Bottom decorative element -->
  <rect x="60" y="660" width="200" height="4" rx="2" fill="#003371" opacity="0.2"/>
  <rect x="280" y="660" width="80" height="4" rx="2" fill="#00875A" opacity="0.3"/>
  
  <!-- Connecting lines between cards -->
  <line x1="420" y1="390" x2="460" y2="390" stroke="#003371" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>
  <line x1="820" y1="390" x2="860" y2="390" stroke="#003371" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>
</svg>